name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Pinned to a commit SHA; the toolchain is otherwise inferred from the
      # tag ref, so it is passed explicitly here.
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32-wasip1
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      # The backend tests adapt to the runner's CPU; wasm is compile-checked
      # both with and without the simd128 batch-2 path.
      - run: cargo build --target wasm32-unknown-unknown
      - name: wasm build (+simd128)
        run: cargo build --target wasm32-unknown-unknown
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
      - name: clippy wasm (+simd128)
        run: cargo clippy --target wasm32-unknown-unknown --all-features -- -D warnings
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
      # The wasm perf example must keep building on the runnable wasi target.
      - run: cargo build --release --example perf --target wasm32-wasip1
      - name: wasm perf build (+simd128)
        run: cargo build --release --example perf --target wasm32-wasip1
        env:
          RUSTFLAGS: "-C target-feature=+simd128"

  # UB checking under the miri interpreter: the scalar core plus the SSE2
  # 2-wide kernel (miri ships SSE2 shims; AVX2/AVX-512 kernels are skipped by
  # runtime detection there). Not a required status check.
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          components: miri
      # The explicit +nightly outranks the repo rust-toolchain.toml pin, which
      # would otherwise resolve to stable 1.92 (no miri component there).
      - run: cargo +nightly miri test
