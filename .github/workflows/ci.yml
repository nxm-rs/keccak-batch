name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      # Pinned to a commit SHA; the toolchain is otherwise inferred from the
      # tag ref, so it is passed explicitly here.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32-wasip1
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-shear
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo shear
      - run: cargo test --all-features
      # The backend tests adapt to the runner's CPU; wasm is compile-checked
      # both with and without the simd128 batch-2 path.
      - run: cargo build --target wasm32-unknown-unknown
      - name: wasm build (+simd128)
        run: cargo build --target wasm32-unknown-unknown
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
      - name: clippy wasm (+simd128)
        run: cargo clippy --target wasm32-unknown-unknown --all-features -- -D warnings
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
      # The wasm perf example must keep building on the runnable wasi target.
      - run: cargo build --release --example perf --target wasm32-wasip1
      - name: wasm perf build (+simd128)
        run: cargo build --release --example perf --target wasm32-wasip1
        env:
          RUSTFLAGS: "-C target-feature=+simd128"
