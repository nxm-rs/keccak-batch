name: Release

# Publishing to crates.io happens locally via `cargo release` (see
# RELEASING.md); the pushed tag only re-runs the checks and creates the
# GitHub release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Pinned to a commit SHA; the toolchain is otherwise inferred from the
      # tag ref, so it is passed explicitly here.
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.92"
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - name: GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
